        <div class="contact_container">
            <div class="contact_header">
                <h2 class="section_title_sub">
                    <span class="en_sub">CONTACT</span>
                    <span class="ja_contact">お問い合わせ</span>
                </h2>
                <p class="contact_lead">ご相談・お見積りは無料です。<br>お気軽にお問い合わせください。</p>
            </div>

            <form
                action="https://docs.google.com/forms/u/0/d/e/1FAIpQLScXr9MxeAiKSvlg9bxWPqcWoA_XSCoW1riY71v_wOl_est5ZQ/formResponse"
                method="post" class="contact_form" target="hidden_iframe" onsubmit="submitted=true;">
                <div class="form_item">
                    <label for="name">お名前<span>*</span></label>
                    <input type="text" id="name" name="entry.1091381557" placeholder="山田太郎" required>
                </div>

                <div class="form_item">
                    <label for="company">会社名</label>
                    <input type="text" id="company" name="entry.567399033" placeholder="株式会社◯◯">
                </div>

                <div class="form_item">
                    <label for="email">メールアドレス<span>*</span></label>
                    <input type="email" id="email" name="entry.273339827" placeholder="sample@example.com" required>
                </div>

                <div class="form_item">
                    <label for="message">お問い合わせ内容<span>*</span></label>
                    <textarea id="message" name="entry.484674638" required></textarea>
                </div>

                <div class="form_btn">
                    <button type="submit">送信</button>
                </div>
            </form>
        </div>


        <footer>
            <div class="footer">
                <img src="./image/footer.jpg" alt="背景">
                <div class="CONTACT_containar">
                    <h2 class="section_title">

                    </h2>
                    <p class="contact_text">制作のご相談やご質問など、下記フォームよりお気軽にお問い合わせください。<br>
